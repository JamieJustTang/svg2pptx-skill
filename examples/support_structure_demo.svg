<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     width="1999" height="550" viewBox="0 0 1999 550">
  <title>支持结构转变示意图 — 可编辑矢量复刻</title>
  <desc>Editable vector recreation of the supplied diagram. Text remains editable.</desc>
  <defs>
    <linearGradient id="leftPanelFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eef4fa"/>
      <stop offset="0.52" stop-color="#eef4fa"/>
      <stop offset="1" stop-color="#eef4fa"/>
    </linearGradient>
    <linearGradient id="rightPanelFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fef3ef"/>
      <stop offset="0.52" stop-color="#fef3ef"/>
      <stop offset="1" stop-color="#fef3ef"/>
    </linearGradient>
    <linearGradient id="arrowFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#71829b"/>
      <stop offset="0.5" stop-color="#78889f"/>
      <stop offset="1" stop-color="#7e8da4"/>
    </linearGradient>
    <filter id="softPanel" x="-5%" y="-8%" width="110%" height="116%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceAlpha" stdDeviation="0.65" result="blur"/>
      <feFlood flood-color="#ffffff" flood-opacity="0.15" result="light"/>
      <feComposite in="light" in2="blur" operator="in" result="soft"/>
      <feMerge><feMergeNode in="SourceGraphic"/><feMergeNode in="soft"/></feMerge>
    </filter>
    <filter id="softEdge" x="-10%" y="-10%" width="120%" height="120%" color-interpolation-filters="sRGB">
      <feGaussianBlur in="SourceAlpha" stdDeviation="0.35" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    </defs>

  <!-- page -->
  <rect x="0" y="0" width="1999" height="550" fill="#fefefe"/>

  <!-- LEFT: Human dialogue -->
  <g id="human-dialogue-panel">
    <rect id="left-panel-background" x="31" y="36" width="776" height="478" rx="32" ry="32"
          fill="url(#leftPanelFill)" stroke="#002060" stroke-width="4"/>

    <g id="left-header" fill="#002060">
      <text font-family="Calibri, Carlito, Arial, sans-serif" font-weight="700" x="136" y="97" font-size="40" textLength="275" lengthAdjust="spacingAndGlyphs">Human dialogue</text>
      <text font-family="Calibri, Carlito, Arial, sans-serif" font-weight="400" x="442" y="95" font-size="28" textLength="289" lengthAdjust="spacingAndGlyphs">Grounding (interaction-side)</text>
    </g>

    <g id="left-coupled-relationship">
      <rect x="64" y="192" width="188" height="95" rx="21" ry="21" fill="#fefefe" stroke="#002060" stroke-width="4"/>
      <rect x="596" y="192" width="181" height="95" rx="21" ry="21" fill="#fefefe" stroke="#002060" stroke-width="4"/>
      <text font-family="Calibri, Carlito, Arial, sans-serif" font-weight="400" fill="#002060" x="84" y="246" font-size="31" textLength="149" lengthAdjust="spacingAndGlyphs">Compression</text>
      <text font-family="Calibri, Carlito, Arial, sans-serif" font-weight="400" fill="#002060" x="628" y="246" font-size="31" textLength="117" lengthAdjust="spacingAndGlyphs">Portability</text>

      <line x1="277" y1="239.5" x2="572" y2="239.5" stroke="#002060" stroke-width="7.5" stroke-linecap="round"/>
      <circle cx="276.5" cy="239.5" r="12.5" fill="#002060"/>
      <circle cx="572" cy="239.5" r="12.5" fill="#002060"/>
      <text font-family='&quot;Arial Narrow&quot;, &quot;Roboto Condensed&quot;, &quot;Liberation Sans Narrow&quot;, Arial, sans-serif' font-weight="700" fill="#002060" x="344" y="220" font-size="44" textLength="174" lengthAdjust="spacingAndGlyphs">COUPLED</text>
    </g>

    <g id="left-interaction-icon" fill="url(#leftPanelFill)" stroke="#002060" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
      <!-- back dialogue bubble -->
      <path d="M318,325 H361 C375,325 386,336 386,350 V362 C386,376 375,387 361,387 H328 L306,402 L311,383 C300,379 294,370 294,358 V350 C294,336 304,325 318,325 Z"/>
      <!-- front dialogue bubble -->
      <path d="M369,350 H407 C421,350 432,361 432,375 V387 C432,401 421,412 407,412 H396 L396,426 L376,412 H366 C352,412 341,401 341,387 V375 C341,361 352,350 366,350 Z"/>
      <g fill="#002060" stroke="none">
        <circle cx="367" cy="381" r="5"/>
        <circle cx="387" cy="381" r="5"/>
        <circle cx="407" cy="381" r="5"/>
      </g>
      <!-- circular exchange arrows -->
      <path d="M455,355 C462,333 481,321 500,323 C514,324 525,333 530,344" fill="none"/>
      <path d="M455,355 L452,344 M455,355 L466,351" fill="none"/>
      <path d="M539,362 C535,384 517,395 497,395 C481,395 466,387 459,373" fill="none"/>
      <path d="M539,362 L528,366 M539,362 L536,373" fill="none"/>
    </g>
    <text id="left-support-caption" font-family="Calibri, Carlito, Arial, sans-serif" font-weight="400" fill="#002060" x="266" y="471" font-size="31" textLength="297" lengthAdjust="spacingAndGlyphs">support sits on interaction</text>
  </g>

  <!-- CENTER: support-structure shift -->
  <g id="support-structure-shift">
    <text font-family="Calibri, Carlito, Arial, sans-serif" font-weight="400" x="836" y="175.5" font-size="32" font-style="italic" fill="#243b60" textLength="267" lengthAdjust="spacingAndGlyphs">support-structure shift</text>
    <path d="M834,225 H1077 V200 L1124,239.5 L1077,280 V256 H834 Z" fill="url(#arrowFill)"/>
  </g>

  <!-- RIGHT: AI-native society -->
  <g id="ai-native-society-panel">
    <rect id="right-panel-background" x="1153" y="35" width="818" height="479" rx="32" ry="32"
          fill="url(#rightPanelFill)" stroke="#e1260b" stroke-width="4"/>

    <g id="right-header" fill="#e1260b">
      <text font-family="Calibri, Carlito, Arial, sans-serif" font-weight="700" x="1189" y="98" font-size="41" textLength="282" lengthAdjust="spacingAndGlyphs">AI-native society</text>
      <text font-family="Calibri, Carlito, Arial, sans-serif" font-weight="400" x="1487" y="96" font-size="28" textLength="459" lengthAdjust="spacingAndGlyphs">shared priors → Circulation (population-side)</text>
    </g>

    <g id="right-decoupled-relationship">
      <rect x="1180" y="192" width="187" height="95" rx="21" ry="21" fill="#fefefe" stroke="#e1260b" stroke-width="4"/>
      <rect x="1742" y="192" width="180" height="95" rx="21" ry="21" fill="#fefefe" stroke="#e1260b" stroke-width="4"/>
      <text font-family="Calibri, Carlito, Arial, sans-serif" font-weight="400" fill="#e1260b" x="1199" y="246" font-size="31" textLength="150" lengthAdjust="spacingAndGlyphs">Compression</text>
      <text font-family="Calibri, Carlito, Arial, sans-serif" font-weight="400" fill="#e1260b" x="1774" y="246.5" font-size="31" textLength="117" lengthAdjust="spacingAndGlyphs">Portability</text>
      <text font-family='&quot;Arial Narrow&quot;, &quot;Roboto Condensed&quot;, &quot;Liberation Sans Narrow&quot;, Arial, sans-serif' font-weight="700" fill="#e1260b" x="1413" y="261" font-size="62" textLength="268" lengthAdjust="spacingAndGlyphs">DECOUPLED</text>
    </g>

    <g id="population-network" fill="none" stroke="#e1260b" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round">
      <!-- network edges, behind nodes -->
      <line x1="1427" y1="324" x2="1475" y2="354"/>
      <line x1="1427" y1="324" x2="1427" y2="387"/>
      <line x1="1427" y1="387" x2="1475" y2="354"/>
      <line x1="1475" y1="354" x2="1531" y2="328"/>
      <line x1="1475" y1="354" x2="1531" y2="397"/>
      <line x1="1531" y1="328" x2="1531" y2="397"/>
      <line x1="1531" y1="328" x2="1585" y2="361"/>
      <line x1="1531" y1="397" x2="1585" y2="361"/>
      <line x1="1585" y1="361" x2="1626" y2="326"/>
      <line x1="1626" y1="326" x2="1644" y2="371"/>
      <line x1="1585" y1="361" x2="1644" y2="371"/>
      <line x1="1585" y1="361" x2="1609" y2="409"/>
      <line x1="1644" y1="371" x2="1609" y2="409"/>

      <!-- nodes -->
      <g id="node-1" transform="translate(1427 324)"><circle r="18" fill="url(#rightPanelFill)"/><circle cx="0" cy="-7.5" r="4.7"/><path d="M-10.3,10.2 C-9.5,2.2 -6.7,-0.2 0,-0.2 C6.7,-0.2 9.5,2.2 10.3,10.2"/><path d="M-10.3,10.2 Q0,13.2 10.3,10.2"/></g>
      <g id="node-2" transform="translate(1427 387)"><circle r="18" fill="url(#rightPanelFill)"/><circle cx="0" cy="-7.5" r="4.7"/><path d="M-10.3,10.2 C-9.5,2.2 -6.7,-0.2 0,-0.2 C6.7,-0.2 9.5,2.2 10.3,10.2"/><path d="M-10.3,10.2 Q0,13.2 10.3,10.2"/></g>
      <g id="node-3" transform="translate(1475 354)"><circle r="18" fill="url(#rightPanelFill)"/><circle cx="0" cy="-7.5" r="4.7"/><path d="M-10.3,10.2 C-9.5,2.2 -6.7,-0.2 0,-0.2 C6.7,-0.2 9.5,2.2 10.3,10.2"/><path d="M-10.3,10.2 Q0,13.2 10.3,10.2"/></g>
      <g id="node-4" transform="translate(1531 328)"><circle r="18" fill="url(#rightPanelFill)"/><circle cx="0" cy="-7.5" r="4.7"/><path d="M-10.3,10.2 C-9.5,2.2 -6.7,-0.2 0,-0.2 C6.7,-0.2 9.5,2.2 10.3,10.2"/><path d="M-10.3,10.2 Q0,13.2 10.3,10.2"/></g>
      <g id="node-5" transform="translate(1531 397)"><circle r="18" fill="url(#rightPanelFill)"/><circle cx="0" cy="-7.5" r="4.7"/><path d="M-10.3,10.2 C-9.5,2.2 -6.7,-0.2 0,-0.2 C6.7,-0.2 9.5,2.2 10.3,10.2"/><path d="M-10.3,10.2 Q0,13.2 10.3,10.2"/></g>
      <g id="node-6" transform="translate(1585 361)"><circle r="18" fill="url(#rightPanelFill)"/><circle cx="0" cy="-7.5" r="4.7"/><path d="M-10.3,10.2 C-9.5,2.2 -6.7,-0.2 0,-0.2 C6.7,-0.2 9.5,2.2 10.3,10.2"/><path d="M-10.3,10.2 Q0,13.2 10.3,10.2"/></g>
      <g id="node-7" transform="translate(1626 326)"><circle r="18" fill="url(#rightPanelFill)"/><circle cx="0" cy="-7.5" r="4.7"/><path d="M-10.3,10.2 C-9.5,2.2 -6.7,-0.2 0,-0.2 C6.7,-0.2 9.5,2.2 10.3,10.2"/><path d="M-10.3,10.2 Q0,13.2 10.3,10.2"/></g>
      <g id="node-8" transform="translate(1644 371)"><circle r="18" fill="url(#rightPanelFill)"/><circle cx="0" cy="-7.5" r="4.7"/><path d="M-10.3,10.2 C-9.5,2.2 -6.7,-0.2 0,-0.2 C6.7,-0.2 9.5,2.2 10.3,10.2"/><path d="M-10.3,10.2 Q0,13.2 10.3,10.2"/></g>
      <g id="node-9" transform="translate(1609 409)"><circle r="18" fill="url(#rightPanelFill)"/><circle cx="0" cy="-7.5" r="4.7"/><path d="M-10.3,10.2 C-9.5,2.2 -6.7,-0.2 0,-0.2 C6.7,-0.2 9.5,2.2 10.3,10.2"/><path d="M-10.3,10.2 Q0,13.2 10.3,10.2"/></g>
    </g>
    <text id="right-support-caption" font-family="Calibri, Carlito, Arial, sans-serif" font-weight="400" fill="#e1260b" x="1362" y="471" font-size="32" textLength="342" lengthAdjust="spacingAndGlyphs">support sits on the population</text>
  </g>
</svg>
